<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Draft Assistant</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0c0f1a;
            color: #c9d1d9;
            min-height: 100vh;
        }

        /* === HEADER === */
        .header {
            background: linear-gradient(135deg, #161b2e 0%, #1a1f35 100%);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            padding: 0 clamp(16px, 3vw, 40px);
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }

        .logo {
            font-size: 17px;
            font-weight: 700;
            color: #f0f6fc;
            letter-spacing: -0.3px;
        }

        .logo span { color: #3b82f6; }

        /* === TABS === */
        .tabs {
            display: flex;
            gap: 2px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 8px;
            padding: 3px;
        }

        .tab {
            padding: 6px 16px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            color: #8b949e;
            border-radius: 6px;
            transition: all 0.15s;
            user-select: none;
        }

        .tab:hover { color: #c9d1d9; background: rgba(255, 255, 255, 0.06); }
        .tab.active { color: #f0f6fc; background: #3b82f6; }

        /* === MAIN === */
        .main {
            max-width: 1320px;
            margin: 0 auto;
            padding: 24px clamp(16px, 3vw, 40px);
        }

        /* === GRID === */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 16px;
        }

        /* === CARD === */
        .card {
            background: #161b2e;
            border: 1px solid #21262d;
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .card:hover {
            border-color: #30363d;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
        }

        /* Image container */
        .card-img-wrap {
            position: relative;
            cursor: pointer;
            overflow: hidden;
            height: 180px;
        }

        .card-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }

        .card-img-wrap:hover img { transform: scale(1.03); }

        /* Difficulty ribbon on image */
        .diff-ribbon {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            backdrop-filter: blur(8px);
        }

        .diff-easy { background: rgba(52, 211, 153, 0.2); color: #34d399; border: 1px solid rgba(52, 211, 153, 0.3); }
        .diff-medium { background: rgba(251, 146, 60, 0.2); color: #fb923c; border: 1px solid rgba(251, 146, 60, 0.3); }
        .diff-hard { background: rgba(248, 113, 113, 0.2); color: #f87171; border: 1px solid rgba(248, 113, 113, 0.3); }

        /* Card body */
        .card-body { padding: 14px 16px 16px; }

        .card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .badge-type {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 7px;
            border-radius: 3px;
        }

        .badge-tip { background: #1e3a5f; color: #60a5fa; }
        .badge-quote { background: #3b1f0b; color: #fb923c; }
        .badge-code { background: #0f2e1b; color: #4ade80; }
        .badge-listicle { background: #2e0f4a; color: #c084fc; }

        .badge-platform {
            font-size: 10px;
            color: #484f58;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: #f0f6fc;
            line-height: 1.4;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-caption {
            font-size: 12px;
            color: #8b949e;
            line-height: 1.5;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .card-tags {
            font-size: 11px;
            color: #3b82f6;
            margin-bottom: 12px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Status line */
        .card-status-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .dot-pending { background: #fbbf24; box-shadow: 0 0 6px rgba(251, 191, 36, 0.4); }
        .dot-posted { background: #34d399; box-shadow: 0 0 6px rgba(52, 211, 153, 0.4); }

        .status-text {
            font-size: 11px;
            color: #484f58;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* === BUTTONS === */
        .btn-row { display: flex; gap: 6px; }
        .btn-row + .btn-row { margin-top: 6px; }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 7px 12px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            text-decoration: none;
            font-family: inherit;
            line-height: 1;
        }

        .btn-primary { background: #2563eb; color: #fff; flex: 1; }
        .btn-primary:hover { background: #1d4ed8; }

        .btn-success {
            background: rgba(52, 211, 153, 0.15);
            color: #34d399;
            border: 1px solid rgba(52, 211, 153, 0.2);
            flex: 1;
        }
        .btn-success:hover { background: rgba(52, 211, 153, 0.25); }

        .btn-ghost {
            background: rgba(255, 255, 255, 0.04);
            color: #8b949e;
            border: 1px solid #21262d;
        }
        .btn-ghost:hover { background: rgba(255, 255, 255, 0.08); color: #c9d1d9; }

        .btn-repost {
            background: rgba(251, 191, 36, 0.1);
            color: #fbbf24;
            border: 1px solid rgba(251, 191, 36, 0.15);
        }
        .btn-repost:hover { background: rgba(251, 191, 36, 0.2); }

        .btn-posted-badge {
            background: rgba(52, 211, 153, 0.1);
            color: #34d399;
            flex: 1;
            cursor: default;
            font-weight: 600;
        }

        .btn-icon { font-size: 13px; }

        /* === MODAL === */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.88);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            cursor: zoom-out;
        }

        .modal.active { display: flex; }

        .modal img {
            max-width: 92vw;
            max-height: 92vh;
            border-radius: 8px;
            cursor: default;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.6);
        }

        /* === TOAST === */
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            color: #f0f6fc;
            padding: 10px 18px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            z-index: 2000;
            border: 1px solid #30363d;
            transform: translateY(80px);
            opacity: 0;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
        }

        .toast.show { transform: translateY(0); opacity: 1; }

        /* === EMPTY === */
        .empty {
            text-align: center;
            padding: 100px 20px;
            color: #484f58;
        }

        .empty h2 { font-size: 18px; color: #8b949e; margin-bottom: 6px; font-weight: 600; }
        .empty p { font-size: 14px; }

        @media (max-width: 500px) {
            .grid { grid-template-columns: 1fr; }
            .card-img-wrap { height: 160px; }
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo"><span>Social</span> Draft Assistant</div>
    <div class="tabs">
        <div class="tab active" data-filter="today">Today</div>
        <div class="tab" data-filter="pending">Pending</div>
        <div class="tab" data-filter="all">All Drafts</div>
    </div>
</div>

<div class="main">
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">
        <h2>No drafts yet</h2>
        <p>Run the generator to create today's content.</p>
    </div>
</div>

<div class="modal" id="modal">
    <img id="modal-img" src="" alt="Preview" onclick="event.stopPropagation()" />
</div>

<div class="toast" id="toast"></div>

<script>
const PLATFORM_URLS = {
    LINKEDIN: 'https://www.linkedin.com/feed/?shareActive=true',
    INSTAGRAM: 'https://www.instagram.com/',
    TWITTER: 'https://twitter.com/compose/tweet'
};

let filter = 'today';
let _authToken = sessionStorage.getItem('authToken') || '';

// Backend API base URL — empty = same origin (local/VM), set for GitHub Pages
// window.API_BASE = 'http://<YOUR_VM_IP>:8080';
const API_BASE = window.API_BASE || '';

function apiUrl(path) {
    return API_BASE + path;
}

function authHeader() {
    return _authToken ? { 'Authorization': 'Basic ' + _authToken } : {};
}

function promptLogin() {
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    if (empty) empty.style.display = 'none';
    grid.innerHTML = `
        <div style="grid-column: 1/-1; text-align:center; padding:60px 20px;">
            <h2 style="color:#e2e8f0; margin-bottom:20px;">Enter Password</h2>
            <input type="password" id="loginPw" placeholder="Dashboard password"
                style="padding:12px 20px; border-radius:10px; border:1px solid #334155;
                background:#1e293b; color:#e2e8f0; font-size:16px; width:260px;"
                onkeydown="if(event.key==='Enter') doLogin()">
            <br><br>
            <button onclick="doLogin()"
                style="padding:10px 30px; border-radius:10px; border:none;
                background:#3b82f6; color:white; font-size:15px; cursor:pointer;">Login</button>
        </div>`;
}

function doLogin() {
    const pw = document.getElementById('loginPw').value;
    if (pw) {
        _authToken = btoa('admin:' + pw);
        sessionStorage.setItem('authToken', _authToken);
        loadDrafts();
    }
}

document.addEventListener('DOMContentLoaded', () => {
    if (!_authToken) { promptLogin(); return; }
    loadDrafts();
    document.querySelectorAll('.tab').forEach(t => {
        t.addEventListener('click', () => {
            document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
            t.classList.add('active');
            filter = t.dataset.filter;
            loadDrafts();
        });
    });
});

async function loadDrafts() {
    const urls = { today: apiUrl('/api/drafts/today'), pending: apiUrl('/api/drafts/pending'), all: apiUrl('/api/drafts/all') };
    try {
        const r = await fetch(urls[filter] || urls.today, { headers: authHeader() });
        if (r.status === 401) { promptLogin(); return; }
        const drafts = await r.json();
        render(drafts);
    } catch (e) { console.error(e); }
}

function render(drafts) {
    const grid = document.getElementById('grid');
    const empty = document.getElementById('empty');
    if (!drafts.length) { grid.innerHTML = ''; empty.style.display = 'block'; return; }
    empty.style.display = 'none';
    grid.innerHTML = drafts.map(card).join('');
}

function card(d) {
    const img = d.image_path ? apiUrl('/images/' + d.image_path.replace(/\\\\/g, '/').replace(/\\/g, '/')) : '';
    const plat = (d.platform || '').toUpperCase();
    const diff = d.difficulty || 'medium';
    const type = d.content_type || 'tip';
    const posted = d.status === 'posted';
    const pending = d.status === 'pending';

    // Build platform URL — Twitter gets pre-filled text
    let url;
    const caption = (d.caption || '').replace(/\\n/g, '\n');
    const tags = d.hashtags || '';
    const fullText = caption + (tags ? '\n\n' + tags : '');
    if (plat.includes('TWITTER')) {
        url = 'https://twitter.com/intent/tweet?text=' + encodeURIComponent(fullText);
    } else {
        url = PLATFORM_URLS[plat] || '#';
    }

    let buttons = '';
    if (pending) {
        buttons = `
            <div class="btn-row">
                <a class="btn btn-primary" href="${url}" target="_blank" onclick="autoCopy(${d.id})">Open ${plat}</a>
                <button class="btn btn-success" onclick="markPosted(${d.id})">Mark Posted</button>
            </div>
            <div class="btn-row">
                <button class="btn btn-ghost" onclick="copyText(${d.id},this)"><span class="btn-icon">&#x1F4CB;</span> Copy Text</button>
                <button class="btn btn-ghost" onclick="copyImg(this)" data-img="${img}"><span class="btn-icon">&#x1F5BC;</span> Copy Image</button>
            </div>`;
    } else if (posted) {
        buttons = `
            <div class="btn-row">
                <div class="btn btn-posted-badge">Posted</div>
                <a class="btn btn-repost" href="${url}" target="_blank" onclick="autoCopy(${d.id})">Post Again</a>
            </div>
            <div class="btn-row">
                <button class="btn btn-ghost" onclick="copyText(${d.id},this)"><span class="btn-icon">&#x1F4CB;</span> Copy Text</button>
                <button class="btn btn-ghost" onclick="copyImg(this)" data-img="${img}"><span class="btn-icon">&#x1F5BC;</span> Copy Image</button>
            </div>`;
    } else {
        buttons = `
            <div class="btn-row">
                <button class="btn btn-success" onclick="markPosted(${d.id})">Reuse &amp; Post</button>
            </div>
            <div class="btn-row">
                <button class="btn btn-ghost" onclick="copyText(${d.id},this)"><span class="btn-icon">&#x1F4CB;</span> Copy Text</button>
                <button class="btn btn-ghost" onclick="copyImg(this)" data-img="${img}"><span class="btn-icon">&#x1F5BC;</span> Copy Image</button>
            </div>`;
    }

    return `
    <div class="card" id="card-${d.id}">
        ${img ? `
        <div class="card-img-wrap" onclick="openModal('${img}')">
            <img src="${img}" alt="" />
            <div class="diff-ribbon diff-${diff}">${diff}</div>
        </div>` : ''}
        <div class="card-body">
            <div class="card-top">
                <span class="badge-type badge-${type}">${type}</span>
                <span class="badge-platform">${plat}</span>
            </div>
            <div class="card-title">${esc(d.title)}</div>
            <div class="card-caption" id="cap-${d.id}">${esc(d.caption || '')}</div>
            <div class="card-tags" id="tags-${d.id}">${esc(d.hashtags || '')}</div>
            <div class="card-status-row">
                <div class="status-dot dot-${d.status || 'pending'}"></div>
                <span class="status-text">${d.status || 'pending'}</span>
            </div>
            ${buttons}
        </div>
    </div>`;
}

async function markPosted(id) {
    await fetch(apiUrl('/api/drafts/post/' + id), { headers: authHeader() });
    toast('Marked as posted');
    loadDrafts();
}

function autoCopy(id) {
    const c = document.getElementById('cap-' + id);
    const t = document.getElementById('tags-' + id);
    const text = (c ? c.textContent.trim() : '') + (t && t.textContent.trim() ? '\n\n' + t.textContent.trim() : '');
    navigator.clipboard.writeText(text).then(() => {
        toast('Caption copied — paste it on the platform');
    });
}

function copyText(id, btn) {
    const c = document.getElementById('cap-' + id);
    const t = document.getElementById('tags-' + id);
    const text = (c ? c.textContent.trim() : '') + (t && t.textContent.trim() ? '\n\n' + t.textContent.trim() : '');
    navigator.clipboard.writeText(text).then(() => {
        flashBtn(btn, 'Copied!');
        toast('Text copied');
    });
}

async function copyImg(btn) {
    const src = btn.dataset.img;
    if (!src) return;
    try {
        const r = await fetch(src, { headers: authHeader() });
        const blob = await r.blob();
        await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
        flashBtn(btn, 'Copied!');
        toast('Image copied');
    } catch (e) {
        window.open(src, '_blank');
        toast('Opened in new tab');
    }
}

function flashBtn(btn, msg) {
    const o = btn.innerHTML;
    btn.innerHTML = '<span class="btn-icon">&#x2705;</span> ' + msg;
    setTimeout(() => btn.innerHTML = o, 1800);
}

function openModal(src) {
    document.getElementById('modal-img').src = src;
    document.getElementById('modal').classList.add('active');
}

document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('active');
});

document.addEventListener('keydown', e => {
    if (e.key === 'Escape') document.getElementById('modal').classList.remove('active');
});

function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
}

function esc(s) {
    if (!s) return '';
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/\\n/g, '<br>');
}
</script>
</body>
</html>
